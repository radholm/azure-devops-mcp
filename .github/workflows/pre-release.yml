name: Nightly Pre-release

permissions:
  contents: read
  id-token: write # Required for OIDC

on:
  schedule:
    - cron: "0 22 * * *" # Runs every day at 22:00 UTC (midnight CEST during daylight saving time)
  workflow_dispatch:

jobs:
  pre-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build the project
        run: bun run build

      - name: Run tests
        run: bun run test

      - name: Publish to npm with nightly version
        run: |
          DATE_STRING=$(date +%Y%m%d)
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          npm version "$CURRENT_VERSION-nightly.$DATE_STRING" --no-git-tag-version
          npm publish --access public --tag nightly --tag next --provenance
