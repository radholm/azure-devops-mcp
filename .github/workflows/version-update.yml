name: Update Package Version

permissions:
  contents: write
  pull-requests: write
  packages: write

on:
  pull_request:
    types:
      - opened
      - edited
      - labeled
      - unlabeled

jobs:
  update-version:
    name: Update Package Version
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'minor') || contains(github.event.pull_request.labels.*.name, 'patch')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version type
        id: version_type
        run: |
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q '"major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"minor"'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"patch"'; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Update package version and push tag
        if: steps.version_type.outputs.type != ''
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"
          NEW_VERSION=$(npm version ${{ steps.version_type.outputs.type }} | tr -d 'v')
          echo "New version: $NEW_VERSION"
          echo "export const packageVersion = \"$NEW_VERSION\";" > src/version.ts
          git add src/version.ts
          git commit --amend --no-edit

      - name: Push changes
        if: steps.version_type.outputs.type != ''
        run: git push origin HEAD:main
