name: Build MCP Server

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  build:
    name: Build the project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Clean install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build the project
        run: bun run build

      - name: Validate tool names and parameters
        run: bun run validate-tools

      - name: Run tests
        run: bun run test

      - name: Display coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "=== Code Coverage Summary ==="
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              console.log('Lines:      ' + c.lines.pct + '%');
              console.log('Functions:  ' + c.functions.pct + '%');
              console.log('Branches:   ' + c.branches.pct + '%');
              console.log('Statements: ' + c.statements.pct + '%');
            "
          fi

      - name: Validate server startup
        run: |
          result=$(node dist/index.js 2>&1 || true)
          if echo "$result" | grep -q "Usage: azure-devops-mcp"; then
            echo "Validation passed."
          else
            echo "Expected usage message not found in output:"
            echo "$result"
            exit 1
          fi

  static-code-analysis:
    name: Static code analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Clean install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build the project
        run: bun run build

      - name: Static code analysis
        run: bun run eslint

      - name: Check code formatting
        run: bun run format-check

      - name: Verify package version is synced
        run: |
          git diff --exit-code ./src/version.ts || {
            echo "Version mismatch detected. Please ensure that the version information in version.ts is up to date with package.json."
            exit 1
          }
          git diff --exit-code ./bun.lockb || {
            echo "Please run 'bun install' to update bun.lockb and add changes to the commit."
            exit 1
          }
